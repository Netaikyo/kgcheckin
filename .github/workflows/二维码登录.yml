name: 二维码登录
on:
  workflow_dispatch:
    inputs:
      number:
        description: "需要登录几个账号？"
        required: true
        default: "1"
      append_user:
        description: "是否追加新账号？（不删除已存在账号信息）"
        required: true
        type: choice
        default: "否"
        options:
          - 是
          - 否
      print_userinfo:
        description: "自动写入失败时是否在日志输出 USERINFO？（含登录token，默认否）"
        required: true
        type: choice
        default: "否"
        options:
          - 否
          - 是
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6
      - name: 创建 Node 环境
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./api/package-lock.json
      - name: 检查 GitHub CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi
          gh --version
      - name: 缓存依赖
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: ./api/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./api/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: 安装依赖
        run: npm run install
        if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}

      # ═══ 步骤一：生成二维码图片并写入 Summary（真实 PNG 图片，可直接扫描）════
      - name: 生成登录二维码图片
        id: gen
        run: node qrcodeLogin.js gen
        env:
          NUMBER: ${{ github.event.inputs.number }}
          USERINFO: ${{ secrets.USERINFO }}
          APPEND_USER: ${{ github.event.inputs.append_user }}

      # ═══ 步骤二：立即上传二维码图片（生成成功后立即可下载，不用等整个 run 结束）════
      - name: 上传二维码图片（立即可下载）
        if: ${{ success() && steps.gen.outcome == 'success' && hashFiles('qr/*.png') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: 二维码图片
          path: qr/*.png
          retention-days: 1

      # ═══ 错误处理：生成失败时给出明确提示 ═══
      - name: 二维码生成失败提示
        if: ${{ failure() && steps.gen.outcome == 'failure' }}
        run: |
          echo "::error::❌ 二维码生成失败，无法继续登录。"
          echo ""
          echo "请检查以下可能的原因："
          echo "  1️⃣ 运行器网络是否能正常访问酷狗接口"
          echo "  2️⃣ npm 依赖是否安装成功（查看上方「安装依赖」步骤的输出）"

      # ═══ 步骤三：轮询等待用户扫码确认（用户在 Summary 页扫完图后自动检测）════
      - name: 等待扫码登录
        id: wait
        if: ${{ success() && steps.gen.outcome == 'success' }}
        run: node qrcodeLogin.js wait
        env:
          USERINFO: ${{ secrets.USERINFO }}
          APPEND_USER: ${{ github.event.inputs.append_user }}
          ALLOW_PRINT_USERINFO: ${{ github.event.inputs.print_userinfo }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # ═══ 最终兜底上传（确保即使前面步骤失败也能拿到已生成的文件）════
      - name: 上传所有生成的文件（兜底）
        if: ${{ always() && hashFiles('qr/*') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: 二维码全部文件
          path: qr/
          retention-days: 1
